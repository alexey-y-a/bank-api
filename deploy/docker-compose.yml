services:
  postgres:
    image: postgres:17-alpine
    container_name: bank-api-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bankdb}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bankdb}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - bank-api-net

  redis:
    image: redis:7-alpine
    container_name: bank-api-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bank-api-net

volumes:
  postgres_data:
  redis_data:

networks:
  bank-api-net:
    driver: bridge